name: Engineer Architect Node.js CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build_backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    strategy:
      matrix:
        node-version: [18.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: ./backend/package-lock.json

    - name: Install dependencies
      run: npm ci

    # 🛡️ Security Agent hook
    - name: Audit NPM Packages
      run: npm audit --audit-level=high || true

    # 🧪 QA Agent hook (Mocked for now since jest isn't setup fully yet)
    # - name: Run tests
    #   run: npm test

    # 🏗️ Architect hook: build/start test
    - name: Syntax & Boot check
      # Runs the server for 5 seconds to catch any top-level SyntaxErrors (like the TypeScript error issue)
      run: |
        npm run start & 
        SERVER_PID=$!
        sleep 5
        kill -0 $SERVER_PID
        if [ $? -eq 0 ]; then
          echo "Server booted successfully with no syntax errors. Terminating..."
          kill $SERVER_PID
        else
          echo "Server failed to boot! Syntax error or missing module caught by Architect Agent."
          exit 1
        fi
