var API_BASE = 'http://localhost:5000/api';

var _ls; try { _ls = window.localStorage; } catch(e) { _ls = {getItem:function(){return null;},setItem:function(){},removeItem:function(){},clear:function(){}}; }
var TokenStore = {
  getAccess:  function() { return _ls.getItem('el_adl_access'); },
  getRefresh: function() { return _ls.getItem('el_adl_refresh'); },
  setTokens:  function(a, r) {
    _ls.setItem('el_adl_access', a);
    _ls.setItem('el_adl_refresh', r);
  },
  clear: function() {
    _ls.removeItem('el_adl_access');
    _ls.removeItem('el_adl_refresh');
    _ls.removeItem('el_adl_user');
  },
  getUser: function() {
    try { return JSON.parse(_ls.getItem('el_adl_user') || 'null'); }
    catch(e) { return null; }
  },
  setUser: function(u) { _ls.setItem('el_adl_user', JSON.stringify(u)); },
};

function apiFetch(path, options) {
  // Frontend rate limit: max 10 calls/10s per endpoint
  var _rlNow = Date.now();
  var _rlKey = ((options&&options.method)||'GET') + ':' + path.split('?')[0];
  if (!window._rl) window._rl = {};
  if (!window._rl[_rlKey]) window._rl[_rlKey] = [];
  window._rl[_rlKey] = window._rl[_rlKey].filter(function(t){ return _rlNow - t < 10000; });
  if (window._rl[_rlKey].length >= 10) {
    return Promise.reject(new Error('Too many requests. Please wait a moment.'));
  }
  window._rl[_rlKey].push(_rlNow);
  var opts = options || {};
  var headers = Object.assign({ 'Content-Type': 'application/json' }, opts.headers || {});
  var token = TokenStore.getAccess();
  if (token) headers['Authorization'] = 'Bearer ' + token;

  return fetch(API_BASE + path, Object.assign({}, opts, { headers: headers }))
    .then(function(res) {
      if (res.status === 401) {
        var rt = TokenStore.getRefresh();
        if (rt) {
          return fetch(API_BASE + '/auth/refresh', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ refreshToken: rt }),
          }).then(function(rr) {
            return rr.json().then(function(rd) {
              var d = rd.data || rd;
              if (d.accessToken) {
                TokenStore.setTokens(d.accessToken, d.refreshToken);
                headers['Authorization'] = 'Bearer ' + d.accessToken;
                return fetch(API_BASE + path, Object.assign({}, opts, { headers: headers }));
              }
              TokenStore.clear();
              return res;
            });
          });
        }
      }
      return res;
    })
    .then(function(res) {
      return res.json().then(function(json) {
        if (!res.ok) throw new Error(json.message || 'Request failed');
        return json.data !== undefined ? json.data : json;
      });
    });
}

// Simulate matched lawyers for a request based on category + city
function getMatchedLawyers(category, city) {
  return LAWYERS.filter(function(l) {
    var cityMatch = !city || l.city === city || city === "";
    var catMatch = !category || String(l.cat) === String(category);
    return cityMatch || catMatch;
  }).slice(0, Math.min(LAWYERS.length, 6));
}

// Generate realistic demo bids from matched lawyers
function generateBids(matched, budget) {
  return matched.map(function(l, i) {
    var basePrice = budget ? Math.round(parseInt(budget) * (0.8 + i*0.1)) : Math.round(l.price * (3 + i*0.5));
    return {
      id: l.id,
      lawyerId: l.id,
      lawyerName: l.name,
      initials: l.initials,
      rating: l.rating,
      reviews: l.reviews,
      exp: l.exp,
      badge: l.badge,
      price: basePrice,
      note: [
        "I have handled " + (l.wins) + " similar cases and can begin immediately. I will provide a full case strategy in our first session.",
        "With " + l.exp + " years specializing in this field, I am confident I can achieve the best outcome for you. My fee is flexible based on case complexity.",
        "I reviewed your request carefully. This is well within my specialty area. I offer a free 15-minute initial call before you commit.",
        "As a " + l.badge + " lawyer with " + l.consultations + " consultations, I guarantee responsive communication throughout your case.",
        "I can start within 24 hours. My approach is transparent - I will update you after every development in your case.",
        "Senior partner with proven track record. I have achieved favorable outcomes in " + l.successRate + "% of similar cases.",
      ][i % 6],
      eta: ["1 hr", "2 hrs", "3 hrs", "4 hrs", "5 hrs", "6 hrs"][i],
      sentAt: new Date(Date.now() - (i * 18 * 60000)).toISOString(),
      status: "pending",
    };
  });
}
